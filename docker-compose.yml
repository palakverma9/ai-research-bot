services:
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres_vector_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vectors_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vectors_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    image: custom-fastapi-app:latest 
    container_name: fastapi_vector_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/uploads
    environment:
      # Tell the app to connect to the db service instead of localhost
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/vectors_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
